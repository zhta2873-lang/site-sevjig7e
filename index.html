            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;

        .festivals-list {

        .festivals-list ul {

            padding: 0;
        }
        .festivals-list li {
            background-color: #e9ecef;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .festivals-list li:hover {
            background-color: #dee2e6;
        }
        .festivals-list li span {

        .festivals-list li button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;

        .festivals-list li button:hover {

            youtubePlayer.src = festival.embed_url + "?autoplay=1";

        }

            titleSpan.textContent = festival.title;
            const playButton = document.createElement('button');
            playButton.textContent = 'تشغيل';
            playButton.onclick = () => loadFestival(festival);

            listItem.appendChild(playButton);
            festivalsUl.appendChild(listItem);
        });

        if (festivals.length > 0) {
            loadFestival(festivals[0]);
